name: audit
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # rustscenic-py is a pyo3 cdylib — linking requires maturin's Python
      # link flags (undefined dynamic_lookup on macOS). It's built separately
      # in the python job via maturin, so exclude it from the raw cargo build.
      - run: cargo build --release --workspace --exclude rustscenic-py
      - run: cargo clippy --workspace --exclude rustscenic-py --all-targets -- -D warnings
      - run: cargo test --workspace --exclude rustscenic-py --release
      # cargo-audit: fails build on known vulns in Cargo.lock. Unmaintained /
      # unsound informational warnings are surfaced but non-fatal. Ubuntu only —
      # we're checking the dep graph, not target triples.
      - name: cargo-audit (Rust supply chain)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          cargo install --quiet --locked cargo-audit
          cargo audit

  python:
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install maturin numpy pandas pyarrow scipy scanpy anndata certifi pytest
      - run: maturin build --release --manifest-path crates/rustscenic-py/Cargo.toml
      - run: pip install target/wheels/rustscenic-*.whl --force-reinstall --no-deps
      # Smoke test the full API surface. Version pulled dynamically from pyproject.toml
      # via a regex (works on Python 3.10+; tomllib is 3.11+ stdlib only) so a
      # release bump can't desync the workflow assertion.
      - run: |
          python <<'PY'
          import re, importlib.metadata, rustscenic
          with open('pyproject.toml') as f:
              expected = re.search(r'^version\s*=\s*"([^"]+)"', f.read(), re.MULTILINE).group(1)
          installed = importlib.metadata.version('rustscenic')
          assert installed == expected, f'version mismatch: installed={installed} expected={expected}'
          for stage in ['grn', 'aucell', 'topics', 'cistarget']:
              mod = getattr(rustscenic, stage)
              print(f'{stage}: OK ({installed})')
          PY
      # Python unit test suite
      - run: pytest tests/ -v
      # End-to-end quickstart runs and produces output
      - run: python -m rustscenic.quickstart
      # Full 4-stage example on real PBMC-3k (downloads 10x tarball)
      - run: pip install scanpy igraph leidenalg
      - run: python examples/pbmc3k_end_to_end.py

  # Per-extra install-matrix smoke: every declared optional-dependency extra
  # must resolve cleanly in a fresh venv on the published install path. Catches
  # packaging regressions like the v0.3.5 igraph/leidenalg gap before they hit
  # collaborators.
  install-matrix:
    runs-on: ubuntu-24.04
    needs: python
    # Reference (pyscenic + arboreto + ctxcore) is informational because pyscenic
    # itself fails to import on current setuptools (pkg_resources removed; the
    # README claim 'pyscenic: ModuleNotFoundError pkg_resources in current stacks'
    # is precisely this). The Docker reference image is the canonical pinned
    # path for parity work; don't gate CI on the broken pip path.
    continue-on-error: ${{ matrix.extra == 'reference' }}
    strategy:
      fail-fast: false
      matrix:
        extra: ["", "examples", "validation", "reference", "benchmarks"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel from current commit
        run: |
          pip install maturin
          maturin build --release --manifest-path crates/rustscenic-py/Cargo.toml
      - name: Install with extra
        run: |
          WHL=$(ls target/wheels/rustscenic-*.whl | head -1)
          if [ -z "${{ matrix.extra }}" ]; then
            pip install "$WHL"
          else
            pip install "$WHL[${{ matrix.extra }}]"
          fi
      - name: Smoke imports for the extra
        run: |
          python <<'PY'
          import importlib, importlib.metadata
          extra = "${{ matrix.extra }}"
          # Always check core
          import rustscenic
          import rustscenic.grn, rustscenic.aucell, rustscenic.topics, rustscenic.cistarget
          ver = importlib.metadata.version("rustscenic")
          print(f"core OK (rustscenic {ver})")

          extras_imports = {
              "examples": ["scanpy", "anndata", "igraph", "leidenalg"],
              "validation": ["scanpy", "anndata", "igraph", "leidenalg", "sklearn"],
              "reference": ["scanpy", "anndata", "sklearn", "pyscenic", "arboreto", "ctxcore"],
              "benchmarks": ["scanpy", "anndata", "sklearn", "tomotopy", "gensim", "psutil"],
          }
          if extra and extra in extras_imports:
              for mod in extras_imports[extra]:
                  importlib.import_module(mod)
                  print(f"  {extra}: {mod} OK")
          PY
